<!DOCTYPE html>
<html>
<head>
    <title>Editar Ingresos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Editar Ingreso</h3>

    <form method="post">
        <label>Fecha</label>
        <input type="date" name="fecha" value="{{ ingreso[0] }}">

        <label>Descripción</label>
        <input type="text" name="descripcion" value="{{ ingreso[1] }}">

        <label>Monto</label>
        <input type="number" step="0.01" name="monto" value="{{ ingreso[2] }}">

        <br>
        <button class="btn btn-success">Guardar cambios</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
