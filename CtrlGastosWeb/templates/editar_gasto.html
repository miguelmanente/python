<!DOCTYPE html>
<html>
<head>
    <title>Editar gasto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Editar gasto</h3>

    <form method="post">
        <label>Fecha</label>
        <input type="date" name="fecha" class="form-control" value="{{ gasto[0] }}">

        <label>Descripción</label>
        <input type="text" name="descripcion" class="form-control" value="{{ gasto[1] }}">

        <label>Categoría</label>
        <select name="categoria" class="form-control">
            {% for cat in categorias %}
                <option value="{{ cat[0] }}" {% if cat[0] == gasto[2] %}selected{% endif %}>
                    {{ cat[0] }}
                </option>
            {% endfor %}
        </select>

        <label>Monto</label>
        <input type="number" step="0.01" name="monto" class="form-control" value="{{ gasto[3] }}">

        <br>
        <button class="btn btn-success">Guardar cambios</button>
        <a href="/" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
